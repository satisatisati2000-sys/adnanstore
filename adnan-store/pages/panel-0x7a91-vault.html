<script>
(function(){
  function openDrawer(){var d=document.getElementById('categoryDrawer'); if(!d) return; d.classList.remove('hidden'); d.setAttribute('aria-hidden','false'); document.body.classList.add('drawer-open');}
  function closeDrawer(){var d=document.getElementById('categoryDrawer'); if(!d) return; d.classList.add('hidden'); d.setAttribute('aria-hidden','true'); document.body.classList.remove('drawer-open');}
  document.addEventListener('click', function(e){
    var open=e.target.closest('[data-open-drawer]');
    if(open){e.preventDefault(); e.stopPropagation(); openDrawer(); return;}
    var close=e.target.closest('[data-close-drawer]');
    if(close){e.preventDefault(); e.stopPropagation(); closeDrawer(); return;}
    var toggle=e.target.closest('[data-category-toggle]');
    if(toggle){e.preventDefault(); var id=toggle.getAttribute('data-category-toggle'); var box=document.getElementById('static-subs-'+id); if(box){box.classList.toggle('hidden'); toggle.setAttribute('aria-expanded', box.classList.contains('hidden')?'false':'true');} return;}
  }, true);
})();
</script>

  <script type="module" src="../js/app.js"></script>
